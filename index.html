<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shnight's Portfolio</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #BF40BF;
        color: #000;
    }

    /* HEADER */
    header {
        background: #000;
        color: #fff;
        padding: 15px 0;
        text-align: center;
        border-bottom: 4px solid #800020;
    }

    header h1 {
        margin: 0;
    }

    nav {
        margin-top: 10px;
    }

    nav a {
        color: #fff;
        margin: 0 15px;
        text-decoration: none;
        font-weight: bold;
    }

    nav a:hover {
        color: #800020;
    }

    /* SECTIONS */
    section {
        display: none;
        padding: 40px;
        text-align: center;
    }

    section.active {
        display: block;
    }

    h2 {
        color: #800020;
    }

    /* GALLERY */
    .gallery { 
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 15px;
        margin-top: 20px;
    }

    .gallery img {
        width: 100%;
        border: 3px solid #000;
    }

     <h2>My Gallery</h2>

    <div class="gallery">
        <img src="image1.jpg" alt="Picture 1">
        <img src="image2.jpg" alt="Picture 2">
        <img src="image3.jpg" alt="Picture 3">
        <img src="image4.jpg" alt="Picture 4">
    </div>


    /* VIDEO */
    .video-container { song with cool rap vibes
        margin-top: 20px;
    }

    iframe {
        width: 80%;
        height: 400px;
        border: 3px solid #000;
    }

    /* FOOTER */
    footer {
        background: #000;
        color: #fff;
        text-align: center;
        padding: 10px;
        border-top: 4px solid #800020;
    }
</style>
</head>

<body>

<header>
    <h1>Shight's Portfolio</h1>
    <nav>
        <a href="#" onclick="showSection('home')">Home</a>
        <a href="#" onclick="showSection('gallery')">Gallery</a>
        <a href="#" onclick="showSection('video')">Video</a>
    </nav>
</header>

<!-- HOME -->
<section id="home" class="active">
    <h2>Home</h2>
    <p>This is my portfollio, for my last project.</p>
    <p>I like to post about my interests and videos.</p>
</section>

<!-- GALLERY -->
<section id="gallery">
    <h2>Gallery</h2>
    <div class="gallery">
        <img src="https://static.wikia.nocookie.net/pplaytime/images/c/c8/Mob_Side_Out.jpg/revision/latest/scale-to-width-down/250?cb=20260227024348" alt="Image 1">
        <img src="https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/1817490/a188e395ba419de1e25b458febddc3fc4852a343/capsule_616x353.jpg?t=1770858209/300" alt="Image 2">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQR9MyZlY1_KntHGeDyGdLVvhV8U_bIJU2ntA&sS/300" alt="Image 3">
        <img src="https://poppyplaytime.wiki.gg/images/thumb/SmillingCrittersHeaderLogoHD.png/640px-SmillingCrittersHeaderLogoHD.png?a05e03/300" alt="Image 4">
    </div>
</section>

<section id="video">
    <h2>Video</h2>
    <div class="video-container">
        <iframe width="560" height="315" src="https://www.youtube.com/embed/27Mmd3D__oY?si=IpBmOCfUxmkbYalS" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    </div>
</section>

<footer>
    <p>© 2026 My Portfolio</p>
</footer>

<script>
function showSection(sectionId) {
    const sections = document.querySelectorAll("section");
    sections.forEach(section => {
        section.classList.remove("active");
    });

    document.getElementById(sectionId).classList.add("active");
}
</script>

</body>
</html>
